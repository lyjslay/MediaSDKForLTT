[work_mode]
poweron_mode = "record"

; vo config
[vo_config]
vo_cnt  = 1

[vo0]
width   = 1920
height  = 440
rotate  = 1  ; 0:0 1:90 2:180 3:270

; window config
[window_config]
window_cnt  = 2

[window0]
enable      = 1
used_crop   = 1
small_win_enable    = 1
bind_vproc_id       = 0
bind_vproc_chn_id   = 1
x           = 0
y           = 0
width       = 1920
height      = 440
s_x         = 0
s_y         = 0
s_width     = 960
s_height    = 440
onestep     = 20
ystep       = 0
mirror      = 0
filp        = 0

[window1]
enable      = 1
used_crop   = 1
small_win_enable    = 1
bind_vproc_id       = 1
bind_vproc_chn_id   = 1
x           = 0
y           = 0
width       = 1920
height      = 440
s_x         = 960
s_y         = 0
s_width     = 960
s_height    = 440
onestep     = 20
ystep       = 0
mirror      = 0
filp        = 0

; Ai config
[ai]
sample_rate = 16000
channel     = 1
num_per_frm = 640
audio_channel = 1

; Aenc config
[aenc]
format      = 3 ; 0: aac, 3: disable
sample_rate = 8000
num_per_frm = 1024
channel     = 1

; Ao config
[ao]
sample_rate = 16000
channel     = 2
num_per_frm = 320
audio_channel = 1

; Speech config
[speech]
enable      = 1
sample_rate = 16000
bitWidth    = 1 ;; 0: AUDIO_BIT_WIDTH_8; 1: AUDIO_BIT_WIDTH_16; 2: AUDIO_BIT_WIDTH_24; 3: AUDIO_BIT_WIDTH_32
model_path  = "/mnt/system/sound_cardv_sr16k_v5_cv181x.cvimodel"

; record
[record_config]
rec_cnt = 1

[record0]
enable          = 1
bind_venc_id    = 0
audio_status    = 1
file_type       = 1 ;// 0:MP4, 1:MOV, 2:TS, 3:ES, 4:NONE
split_time      = 60000 ; msec
pre_time        = 0 ; sec
post_time       = 10 ; sec
timelapse_recorder_fps  = 25
timelapse_recorder_gop  = 0
memory_buffer_sec = 0
pre_alloc_unit  = 20 ;//pre allocate unit  MB
normal_extend_video_buffer_sec = 2.0
event_extend_video_buffer_sec = 2.0
extend_other_buffer_sec = 2.0
short_file_ms = 200

; rtsp config
[rtsp_config]
rtsp_cnt    = 1
port=554
timeout=120

[rtsp0]
enable      = 1
bind_venc_id= 1
max_conn = 2
name = "cvi_cam_0"

; PIV config
[piv_config]
piv_cnt     = 1

[piv0]
bind_venc_id    = 2

; thm config
[thm_config]
thm_cnt     = 1

[thm0]
bind_venc_id    = 3

