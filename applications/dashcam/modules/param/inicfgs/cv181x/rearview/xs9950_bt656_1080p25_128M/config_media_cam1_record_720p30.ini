[common]
media_mode = "record_720p30"

; vb pool config
[vb_config]
vbpool_cnt = 5

[vbpool0]
enable          = 1
frame_width     = 1280
frame_height    = 720
frame_fmt       = 25 ; 12: yuv422  13: yuv420 19:NV21
blk_cnt         = 3

[vbpool1]
enable          = 1
frame_width     = 640
frame_height    = 360
frame_fmt       = 19 ; 12: yuv422  13: yuv420 19:NV21
blk_cnt         = 3

[vbpool2]
enable          = 1
frame_width     = 320
frame_height    = 180
frame_fmt       = 19 ; 12: yuv422  13: yuv420 19:NV21
blk_cnt         = 3

[vbpool3]
enable          = 1
frame_width     = 320
frame_height    = 180
frame_fmt       = 15 ; 12: yuv422  13: yuv420 19:NV21
blk_cnt         = 2

[vbpool4]
enable          = 1
frame_width     = 1280
frame_height    = 720
frame_fmt       = 19 ; 12: yuv422  13: yuv420 19:NV21
blk_cnt         = 3

; sensor
[sensor_config]
enable  = 1
id      = 1
wdrmode = 0 ;0:linear, 3:wdr 2to1
i2cid   = 4
i2caddr = 51 ;
hwsync  = 0
cam_clk_id = 1; 0:clk0, 1:clk1
rst_gpio_inx = 1; 0: group A, 1: group B ...
rst_gpio_pin = 15; 0: PIN 0, 1: PIN 1, 2: PIN 2....
rst_gpio_pol = 1; 1: OF_GPIO_ACTIVE_LOW, 2: OF_GPIO_SINGLE_ENDED, 4: OF_GPIO_OPEN_DRAIN
                ; 8: OF_GPIO_TRANSITORY, 16: OF_GPIO_PULL_UP, 32: OF_GPIO_PULL_DOWN
mipidev = 1
laneid0 = 3
laneid1 = 4
laneid2 = 5
laneid3 = -1
laneid4 = -1
swap0   = 1
swap1   = 1
swap2   = 1
swap3   = 0
swap4   = 0

; vcap
[vcap_config]
enable  = 1
id      = 1
width   = 1280
height  = 720
fmt     = 25 ; //12 yuv422 //13 yuv420 //19 nv21 //18 nv12
cpress  = 1 ;NONE : 0 TILE : 1,LINE:2, FRAME:3
mirror  = 0
filp    = 0
enfbm   = 1

; vproc
[vproc_config]
id      = 1  ;//online mode this id must 1
width   = 1280
height  = 720
fmt     = 25 ; //12 yuv422 //13 yuv420 //19 nv21 //18 nv12
srcfps  = -1
dstfps  = -1
chn_num = 4

[vproc_chn0]
chn_id      = 0
chn_enable  = 1
chn_width   = 1280
chn_height  = 720
chn_vfmt    = 0 ;// 0 linear
chn_fmt     = 19 ; //12 yuv422 //13 yuv420
chn_depth   = 0
chn_srcfps  = -1
chn_dstfps  = -1
chn_mirror  = 0
chn_filp    = 0

[vproc_chn1]
chn_id      = 1
chn_enable  = 1
chn_width   = 1920
chn_height  = 480
chn_vfmt    = 0 ;// 0 linear
chn_fmt     = 13 ; //12 yuv422 //13 yuv420
chn_depth   = 1
chn_srcfps  = -1
chn_dstfps  = -1
chn_mirror  = 0
chn_filp    = 0


[vproc_chn2]
chn_id      = 2
chn_enable  = 0
chn_width   = 640
chn_height  = 480
chn_vfmt    = 0 ;// 0 linear
chn_fmt     = 13 ; //12 yuv422 //13 yuv420
chn_depth   = 1
chn_srcfps  = -1
chn_dstfps  = -1
chn_mirror  = 0
chn_filp    = 0

[vproc_chn3]
chn_id      = 3
chn_enable  = 0
chn_width   = 320
chn_height  = 180
chn_vfmt    = 0 ;// 0 linear
chn_fmt     = 13 ; //12 yuv422 //13 yuv420
chn_depth   = 1
chn_srcfps  = -1
chn_dstfps  = -1
chn_mirror  = 0
chn_filp    = 0

[ext_chn0] ;//ext chn only in dual mode
chn_enable  = 1
chn_id      = 2
bind_vproc_chn_id   = 1
chn_width   = 640
chn_height  = 480
chn_vfmt    = 0 ;// 0 linear
chn_fmt     = 19; //12 yuv422 //13 yuv420;
chn_depth   = 1
chn_srcfps  = -1
chn_dstfps  = -1
chn_mirror  = 0
chn_filp    = 0

[ext_chn1] ;//ext chn only in dual mode
chn_enable  = 1
chn_id      = 3
bind_vproc_chn_id   = 2
chn_width   = 320
chn_height  = 180
chn_vfmt    = 0 ;// 0 linear
chn_fmt     = 19; //12 yuv422 //13 yuv420;
chn_depth   = 1
chn_srcfps  = -1
chn_dstfps  = -1
chn_mirror  = 0
chn_filp    = 0

; venc
[venc_config]
chn_num = 4


[venc_chn0]
enable      = 1
id          = 4
bind_vproc_id       = 1
bind_vproc_chn_id   = 0
venc_bind_mode = 1
width       = 1280
height      = 720
codec       = 0 ; 0:h264  1:h265 2:jpeg 3:mjpeg
pixel_fmt   = 13 ; //12 yuv422 //13 yuv420;
gop         = 15
fps         = 30
rate_ctrl_mode  = 0 ; 0: CBR 1:VBR 2:AVBR 3:QVBR 4:FIXQP 5:QPMAP
bit_rate    = 12000;kbps
iqp         = 22
pqp         = 22
min_iqp     = 16
max_iqp     = 42
min_qp      = 16
max_qp      = 42
bufSize     = 786432
videoSignalType_Flag = 1
video_Format = 5
videoFull_Flag = 1

[venc_chn1]
enable      = 1
id          = 5
bind_vproc_id       = 1
bind_vproc_chn_id   = 2
width       = 640
height      = 480
codec       = 0 ; 0:h264  1:h265 2:jpeg 3:mjpeg
pixel_fmt   = 13 ; //12 yuv422 //13 yuv420;
gop         = 30
fps         = 30
rate_ctrl_mode  = 0 ; 0: CBR 1:VBR 2:AVBR 3:QVBR 4:FIXQP 5:QPMAP
bit_rate    = 1500 ;kbps
iqp         = 32
pqp         = 32
min_iqp     = 16
max_iqp     = 42
min_qp      = 16
max_qp      = 42
bufSize     = 262144
videoSignalType_Flag = 1
video_Format = 5
videoFull_Flag = 1

[venc_chn2]
enable      = 1
id          = 6
bind_vproc_id       = 1
bind_vproc_chn_id   = 0
width       = 1280
height      = 720
codec       = 2 ; 0:h264  1:h265 2:jpeg 3:mjpeg
pixel_fmt   = 13; //12 yuv422 //13 yuv420;
single_EsBuf= 1
jpeg_quality=99
bufSize     = 409600

[venc_chn3]
enable      = 1
id          = 7
bind_vproc_id       = 1
bind_vproc_chn_id   = 3
width       = 320
height      = 180
codec       = 2 ; 0:h264  1:h265 2:jpeg 3:mjpeg
pixel_fmt   = 13; //12 yuv422 //13 yuv420;
single_EsBuf= 1
jpeg_quality=80
bufSize     = 131072
