[work_mode]
poweron_mode = "record"

; vo config
[vo_config]
vo_cnt  = 1

[vo0]
width   = 480
height  = 360
rotate  = 0 ;0  ; 0:0 1:90 2:180 3:270

; window config
[window_config]
window_cnt  = 2

[window0]
enable      = 1
used_crop   = 1
small_win_enable    = 0
bind_vproc_id       = 0
bind_vproc_chn_id   = 1
x           = 0
y           = 45
width       = 480
height      = 270
s_x         = 0
s_y         = 45
s_width     = 240
s_height    = 270
onestep     = 20
ystep       = 0
mirror      = 0
filp        = 0

[window1]
enable      = 1
used_crop   = 1
small_win_enable    = 1
bind_vproc_id       = 1
bind_vproc_chn_id   = 1
x           = 0
y           = 45
width       = 480
height      = 270
s_x         = 0
s_y         = 0
s_width     = 240
s_height    = 136
onestep     = 20
ystep       = 0
mirror      = 0
filp        = 0

; Ai config
[ai]
sample_rate = 16000
channel     = 1
num_per_frm = 640
audio_channel = 1
volume = 20

; Aenc config
[aenc]
format      = 3 ; 0: aac, 3: disable
sample_rate = 8000
num_per_frm = 1024
channel     = 1

; Ao config
[ao]
sample_rate = 16000
channel     = 2
num_per_frm = 320
audio_channel = 1
volume = 32

; Speech config
[speech]
enable      = 1
sample_rate = 16000
bitWidth    = 1 ;; 0: AUDIO_BIT_WIDTH_8; 1: AUDIO_BIT_WIDTH_16; 2: AUDIO_BIT_WIDTH_24; 3: AUDIO_BIT_WIDTH_32
model_path  = "/mnt/system/sound_cardv_sr16k_v5_cv181x.cvimodel"

; record
[record_config]
rec_cnt = 2

[record0]
enable          = 1
bind_venc_id    = 0
audio_status    = 1
file_type       = 1 ;// 0:MP4, 1:MOV, 2:TS, 3:ES, 4:NONE
split_time      = 60000 ; msec
pre_time        = 0 ; sec
post_time       = 10 ; sec
timelapse_recorder_fps  = 25
timelapse_recorder_gop  = 0
memory_buffer_sec = 0
pre_alloc_unit  = 20 ;//pre allocate unit  MB
normal_extend_video_buffer_sec = 2.0
event_extend_video_buffer_sec = 2.0
extend_other_buffer_sec = 2.0
short_file_ms = 200

[record1]
enable          = 1
bind_venc_id    = 4
audio_status    = 1
file_type       = 1 ;// 0:MP4, 1:MOV, 2:TS, 3:ES, 4:NONE
split_time      = 60000 ; msec
pre_time        = 0 ; sec
post_time       = 10 ; sec
timelapse_recorder_fps  = 25
timelapse_recorder_gop  = 0
memory_buffer_sec = 0
pre_alloc_unit  = 20 ;//pre allocate unit  MB
normal_extend_video_buffer_sec = 2.0
event_extend_video_buffer_sec = 2.0
extend_other_buffer_sec = 2.0
short_file_ms = 200

; rtsp config
[rtsp_config]
rtsp_cnt    = 2
port        = 554
timeout     = 120

[rtsp0]
enable      = 1
bind_venc_id= 1
reuse_first_src= 0
max_conn    = 2
name = "cvi_cam_0"

[rtsp1]
enable      = 1
bind_venc_id= 5
reuse_first_src= 0
max_conn    = 2
name = "cvi_cam_1"

; PIV config
[piv_config]
piv_cnt     = 2

[piv0]
bind_venc_id    = 2

[piv1]
bind_venc_id    = 6

; thm config
[thm_config]
thm_cnt     = 2

[thm0]
bind_venc_id    = 3
bind_vproc_id   = 0
bind_vproc_chn_id = 3

[thm1]
bind_venc_id    = 7
bind_vproc_id   = 1
bind_vproc_chn_id = 3
