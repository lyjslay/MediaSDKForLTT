[work_mode]
poweron_mode = "record"

; Ai config
[ai]
sample_rate = 16000
channel     = 1
num_per_frm = 640
audio_channel = 1

; Aenc config
[aenc]
format      = 3 ; 0: aac, 3: disable
sample_rate = 16000
num_per_frm = 640
channel     = 1

; Ao config
[ao]
sample_rate = 16000
channel     = 2
num_per_frm = 640
audio_channel = 1

; Speech config
[speech]
enable      = 1
sample_rate = 16000
bitWidth    = 1 ;; 0: AUDIO_BIT_WIDTH_8; 1: AUDIO_BIT_WIDTH_16; 2: AUDIO_BIT_WIDTH_24; 3: AUDIO_BIT_WIDTH_32
model_path  = "/mnt/system/sound_cardv_sr16k_v5_cv181x.cvimodel"

; record
[record_config]
rec_cnt = 1

[record0]
enable          = 1
bind_venc_id    = 0
audio_status    = 1
file_type       = 1 ;// 0:MP4, 1:MOV, 2:TS, 3:ES, 4:NONE
split_time      = 60000 ; msec
pre_time        = 0 ; sec
post_time       = 10 ; sec
timelapse_recorder_fps  = 25
timelapse_recorder_gop  = 0
memory_buffer_sec = 0
pre_alloc_unit  = 20 ;//pre allocate unit  MB
normal_extend_video_buffer_sec = 2.0
event_extend_video_buffer_sec = 2.0
extend_other_buffer_sec = 2.0
short_file_ms = 200

; rtsp config
[rtsp_config]
rtsp_cnt    = 1

[rtsp0]
enable      = 1
bind_venc_id= 1
reuse_first_src= 0
timeout=120

; PIV config
[piv_config]
piv_cnt     = 1

[piv0]
bind_venc_id    = 2

; thm config
[thm_config]
thm_cnt     = 1

[thm0]
bind_venc_id    = 3
bind_vproc_id   = 0
bind_vproc_chn_id = 2
