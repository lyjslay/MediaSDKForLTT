[common]
media_mode = "record_1440p30"

; vb pool config
[vb_config]
vbpool_cnt = 4

[vbpool0]
enable          = 1
frame_width     = 2560
frame_height    = 1440
frame_fmt       = 19 ; 12: yuv422  13: yuv420 19:NV21
; blk_size      = xxxx
blk_cnt         = 3

[vbpool1]
enable          = 1
frame_width     = 854
frame_height    = 480
frame_fmt       = 19 ; 12: yuv422  13: yuv420 19:NV21
blk_cnt          = 6

[vbpool2]
enable          = 1
frame_width     = 640
frame_height    = 360
frame_fmt       = 19 ; 12: yuv422  13: yuv420 19:NV21
blk_cnt          = 2

[vbpool3]
enable          = 1
frame_width     = 320
frame_height    = 180
frame_fmt       = 19 ; 12: yuv422  13: yuv420 19:NV21
blk_cnt         = 2

; sensor
[sensor_config]
enable  = 1
id      = 0
wdrmode = 0 ;0:linear, 3:wdr 2to1
i2cid   = 3
i2caddr = 255 ;
hwsync  = 0
mipidev = 0
laneid0 = 0
laneid1 = 1
laneid2 = 2
laneid3 = -1
laneid4 = -1
swap0   = 0
swap1   = 0
swap2   = 0
swap3   = 0
swap4   = 0

; vcap
[vcap_config]
enable  = 1
id      = 0
width   = 2560
height  = 1440
fmt     = 19 ; //12 yuv422 //13 yuv420; //19 nv21;
cpress  = 1 ;NONE : 0 TILE : 1,LINE:2, FRAME:3
mirror  = 0
filp    = 0
fps     = 30 ; // vi fps setting, support float
enfbm   = 1

; vproc
[vproc_config]
id      = 0  ;//online mode this id must 0
width   = 2560
height  = 1440
fmt     = 19 ; //12 yuv422 //13 yuv420;
srcfps  = -1
dstfps  = -1
chn_num = 4

[vproc_chn0]
chn_id      = 0
chn_enable  = 1
chn_width   = 2560
chn_height  = 1440
chn_vfmt    = 0 ;// 0 linear
chn_fmt     = 19; //12 yuv422 //13 yuv420 //19 nv21;
chn_depth   = 0
chn_srcfps  = -1
chn_dstfps  = -1
chn_mirror  = 0
chn_filp    = 0

[vproc_chn1]
chn_id      = 1
chn_enable  = 1
chn_width   = 854
chn_height  = 480
chn_vfmt    = 0 ;// 0 linear
chn_fmt     = 19; //12 yuv422 //13 yuv420; //19 nv21;
chn_depth   = 0
chn_srcfps  = -1
chn_dstfps  = -1
chn_mirror  = 0
chn_filp    = 0

[vproc_chn2]
chn_id      = 2
chn_enable  = 0
chn_width   = 640
chn_height  = 480
chn_vfmt    = 0 ;// 0 linear
chn_fmt     = 13; //12 yuv422 //13 yuv420;
chn_depth   = 0
chn_srcfps  = -1
chn_dstfps  = -1
chn_mirror  = 0
chn_filp    = 0

[vproc_chn3]
chn_id      = 3
chn_enable  = 0
chn_width   = 320
chn_height  = 180
chn_vfmt    = 0 ;// 0 linear
chn_fmt     = 13; //12 yuv422 //13 yuv420;
chn_depth   = 0
chn_srcfps  = -1
chn_dstfps  = -1
chn_mirror  = 0
chn_filp    = 0

[ext_chn0] ;//ext chn only in dual mode 
chn_enable  = 1
chn_id      = 2
bind_vproc_chn_id   = 1
chn_width   = 640
chn_height  = 360
chn_vfmt    = 0 ;// 0 linear
chn_fmt     = 19; //12 yuv422 //13 yuv420;
chn_depth   = 0
chn_srcfps  = -1
chn_dstfps  = -1
chn_mirror  = 0
chn_filp    = 0

[ext_chn1] ;//ext chn only in dual mode 
chn_enable  = 1
chn_id      = 3
bind_vproc_chn_id   = 2
chn_width   = 320
chn_height  = 180
chn_vfmt    = 0 ;// 0 linear
chn_fmt     = 19; //12 yuv422 //13 yuv420;
chn_depth   = 0
chn_srcfps  = -1
chn_dstfps  = -1
chn_mirror  = 0
chn_filp    = 0

; venc
[venc_config]
chn_num = 4

[venc_chn0]
enable      = 1
id          = 0
bind_vproc_id       = 0
bind_vproc_chn_id   = 0
venc_bind_mode = 1
width       = 2560
height      = 1440
codec       = 0 ; 0:h264  1:h265 2:jpeg 3:mjpeg
pixel_fmt   = 13; //12 yuv422 //13 yuv420;
gop         = 15
fps         = 30; // support float
rate_ctrl_mode  = 0 ; 0: CBR 1:VBR 2:AVBR 3:QVBR 4:FIXQP 5:QPMAP
bit_rate    = 16000;kbps
iqp         = 22
pqp         = 22
min_iqp     = 1
max_iqp     = 51
min_qp      = 1
max_qp      = 51
aspectRatio_Flag = 0
overscan_Flag = 0
videoSignalType_Flag = 1
video_Format = 5
videoFull_Flag = 1
colourDescription_Flag = 0
videoSignalType_Flag = 1
video_Format = 5
videoFull_Flag = 1

[venc_chn1]
enable      = 1
id          = 1
bind_vproc_id       = 0
bind_vproc_chn_id   = 2
venc_bind_mode = 1
width       = 640
height      = 360
codec       = 0 ; 0:h264  1:h265 2:jpeg 3:mjpeg
pixel_fmt   = 13; //12 yuv422 //13 yuv420;
gop         = 15
fps         = 30; // support float
rate_ctrl_mode  = 0 ; 0: CBR 1:VBR 2:AVBR 3:QVBR 4:FIXQP 5:QPMAP
bit_rate    = 1500 ;kbps
iqp         = 32
pqp         = 32
min_iqp     = 1
max_iqp     = 51
min_qp      = 1
max_qp      = 51
aspectRatio_Flag = 0
overscan_Flag = 0
videoSignalType_Flag = 1
video_Format = 5
videoFull_Flag = 1
colourDescription_Flag = 0
videoSignalType_Flag = 1
video_Format = 5
videoFull_Flag = 1

[venc_chn2]
enable      = 1
id          = 2
bind_vproc_id       = 0
bind_vproc_chn_id   = 0
width       = 2560
height      = 1440
codec       = 2 ; 0:h264  1:h265 2:jpeg 3:mjpeg
pixel_fmt   = 19; //12 yuv422 //13 yuv420;
single_EsBuf= 1
jpeg_quality = 99

[venc_chn3]
enable      = 1
id          = 3
bind_vproc_id       = 0
bind_vproc_chn_id   = 3
width       = 320
height      = 180
codec       = 2 ; 0:h264  1:h265 2:jpeg 3:mjpeg
pixel_fmt   = 19; //12 yuv422 //13 yuv420;
single_EsBuf= 1
jpeg_quality = 80

; osd config
[osd_config]
osd_cnt     = 3

[osd_content0]
type        = 0 ;//0: time 1:customeer string 2: circle 3:bmp
color       = 65535 ;//argb1555 0xffff
time_fmt    = 0 ;//yyyy-mm-dd
width       = 24
height      = 30
bg_color    = 32767 ; argb1555 0x7fff
display_num = 1

[osd_content0.osd_display0]
enable      = 1
bind_mode   = 0 ;//0 - vproc mode 1 - disp mode
mod_hdl     = 0 ;//vproc id
chn_hdl     = 0 ;//vproc chnid
coordinate  = 0 ;//0 - RATIO_COOR  1 - ABS_COOR
start_x     = 1
start_y     = 95
batch       = 0 ;//0 camid = 0, 1 camid = 1

[osd_content1]
type        = 0 ;//0 - time 1 - customeer string 2 - bmp
color       = 65535 ;//argb1555 0xffff
time_fmt    = 0 ;//yyyy-mm-dd
width       = 16
height      = 16
bg_color    = 32767 ; argb1555 0x7fff
display_num = 1

[osd_content1.osd_display0]
enable      = 1
bind_mode   = 0 ;//0 - vproc mode 1 - disp mode
mod_hdl     = 0 ;//vproc id
chn_hdl     = 2 ;//vproc chnid
coordinate  = 0 ;//0 - RATIO_COOR  1 - ABS_COOR
start_x     = 1
start_y     = 95
batch       = 0 ;//0 camid = 0, 1 camid = 1

[osd_content2]
type        = 1 ;//0 - time 1 - customeer string 2 - bmp
string      = " "
color       = 65535 ;//argb1555 0xffff
width       = 24
height      = 30
bg_color    = 32767 ; argb1555 0x7fff
display_num = 1

[osd_content2.osd_display0]
enable      = 1
bind_mode   = 0 ;//0 - vproc mode 1 - disp mode
mod_hdl     = 0 ;//vproc id
chn_hdl     = 0 ;//vproc chnid
coordinate  = 0 ;//0 - RATIO_COOR  1 - ABS_COOR
start_x     = 1
start_y     = 90
batch       = 0 ;//0 camid = 0, 1 camid = 1

