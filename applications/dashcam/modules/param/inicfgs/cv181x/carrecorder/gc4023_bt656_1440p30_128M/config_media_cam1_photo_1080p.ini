[common]
media_mode = "photo_1080p"

; vb pool config
[vb_config]
vbpool_cnt = 2

[vbpool0]
enable          = 1
frame_width     = 1920
frame_height    = 1080
frame_fmt       = 22 ; 12: yuv422  13: yuv420 19:NV21
blk_cnt         = 2

[vbpool1]
enable          = 1
frame_width     = 320
frame_height    = 180
frame_fmt       = 19 ; 12: yuv422  13: yuv420 19:NV21
blk_cnt         = 2

; sensor
[sensor_config]
enable  = 1
id      = 1
wdrmode = 0 ;0:linear, 3:wdr 2to1
i2cid   = 4
i2caddr = 68 ;
cam_clk_id = 2; 0:clk0, 1:clk1
rst_gpio_inx = 1; 0: group A, 1: group B ...
rst_gpio_pin = 11; 0: PIN 0, 1: PIN 1, 2: PIN 2....
rst_gpio_pol = 1; 1: OF_GPIO_ACTIVE_LOW, 2: OF_GPIO_SINGLE_ENDED, 4: OF_GPIO_OPEN_DRAIN
                ; 8: OF_GPIO_TRANSITORY, 16: OF_GPIO_PULL_UP, 32: OF_GPIO_PULL_DOWN
hwsync  = 0
mipidev = 1
laneid0 = -1
laneid1 = -1
laneid2 = -1
laneid3 = -1
laneid4 = -1
swap0   = 0
swap1   = 0
swap2   = 0
swap3   = 0
swap4   = 0

; vcap
[vcap_config]
enable  = 1
id      = 1
width   = 1920
height  = 1080
fmt     = 22 ; //12 yuv422 //13 yuv420 //19 nv21 //18 nv12
cpress  = 1 ;NONE : 0 TILE : 1,LINE:2, FRAME:3
mirror  = 0
filp    = 0
fps     = 25
enfbm   = 1

; vproc
[vproc_config]
id      = 1  ;//online mode this id must 1
width   = 1920
height  = 1080
fmt     = 22 ; //12 yuv422 //13 yuv420 //19 nv21 //18 nv12 //22 yuyv
srcfps  = -1
dstfps  = -1
chn_num = 3

[vproc_chn0]
chn_id      = 0
chn_enable  = 1
chn_width   = 1920
chn_height  = 1080
chn_vfmt    = 0 ;// 0 linear
chn_fmt     = 19 ; //12 yuv422 //13 yuv420 //19 nv21
chn_depth   = 0
chn_srcfps  = -1
chn_dstfps  = -1
chn_mirror  = 0
chn_filp    = 0
; lowdelay_cnt= 288

[vproc_chn1]
chn_id      = 1
chn_enable  = 1
chn_width   = 640
chn_height  = 360
chn_vfmt    = 0 ;// 0 linear
chn_fmt     = 19 ; //12 yuv422 //13 yuv420
chn_depth   = 1
chn_srcfps  = -1
chn_dstfps  = -1
chn_mirror  = 0
chn_filp    = 0
chn_vbcnt   = 3

[vproc_chn2]
chn_id      = 2
chn_enable  = 1
chn_width   = 320
chn_height  = 180
chn_vfmt    = 0 ;// 0 linear
chn_fmt     = 19 ; //12 yuv422 //13 yuv420
chn_depth   = 0
chn_srcfps  = -1
chn_dstfps  = -1
chn_mirror  = 0
chn_filp    = 0

[vproc_chn3]
chn_id      = 3
chn_enable  = 0
chn_width   = 320
chn_height  = 180
chn_vfmt    = 0 ;// 0 linear
chn_fmt     = 19 ; //12 yuv422 //13 yuv420
chn_depth   = 0
chn_srcfps  = -1
chn_dstfps  = -1
chn_mirror  = 0
chn_filp    = 0

[ext_chn0] ;//ext chn only in dual mode
chn_enable  = 0
chn_id      = 3
bind_vproc_chn_id   = 2
chn_width   = 320
chn_height  = 180
chn_vfmt    = 0 ;// 0 linear
chn_fmt     = 19; //12 yuv422 //13 yuv420;
chn_depth   = 0
chn_srcfps  = -1
chn_dstfps  = -1
chn_mirror  = 0
chn_filp    = 0

[ext_chn1] ;//ext chn only in dual mode
chn_enable  = 0
chn_id      = 3
bind_vproc_chn_id   = 2
chn_width   = 320
chn_height  = 180
chn_vfmt    = 0 ;// 0 linear
chn_fmt     = 19; //12 yuv422 //13 yuv420;
chn_depth   = 0
chn_srcfps  = -1
chn_dstfps  = -1
chn_mirror  = 0
chn_filp    = 0

; venc
[venc_config]
chn_num = 2

[venc_chn0]
enable      = 1
id          = 6
bind_vproc_id       = 1
bind_vproc_chn_id   = 0
width       = 4608
height      = 2592
codec       = 2 ; 0:h264  1:h265 2:jpeg 3:mjpeg
pixel_fmt   = 13; //12 yuv422 //13 yuv420;
single_EsBuf= 1
jpeg_quality= 80
bufSize     = 4194304


[venc_chn1]
enable      = 1
id          = 7
bind_vproc_id       = 1
bind_vproc_chn_id   = 2
width       = 320
height      = 180
codec       = 2 ; 0:h264  1:h265 2:jpeg 3:mjpeg
pixel_fmt   = 13; //12 yuv422 //13 yuv420;
single_EsBuf= 1
jpeg_quality= 80
bufSize     = 65536

; osd config
[osd_config]
osd_cnt     = 2

[osd_content0]
type        = 0 ;//0 - time 1 - customeer string 2 - bmp
color       = 65535 ;//argb1555 0xffff
time_fmt    = 0 ;//yyyy-mm-dd
width       = 24
height      = 30
bg_color    = 32767 ; argb1555 0x7fff
display_num = 1

[osd_content0.osd_display0]
enable      = 1
bind_mode   = 0 ;//0 - vproc mode 1 - disp mode
mod_hdl     = 1 ;//vproc id
chn_hdl     = 0 ;//vproc chnid
coordinate  = 0 ;//0 - RATIO_COOR  1 - ABS_COOR
start_x     = 1
start_y     = 95
batch       = 1 ;//0 camid = 0, 1 camid = 1

[osd_content1]
type        = 1 ;//0 - time 1 - customeer string 2 - bmp
color       = 65535 ;//argb1555 0xffff
string      = "AA8888AA"
width       = 24
height      = 30
bg_color    = 32767 ; argb1555 0x7fff
display_num = 1

[osd_content1.osd_display0]
enable      = 1
bind_mode   = 0 ;//0 - vproc mode 1 - disp mode
mod_hdl     = 1 ;//vproc id
chn_hdl     = 0 ;//vproc chnid
coordinate  = 0 ;//0 - RATIO_COOR ?1 - ABS_COOR
start_x     = 1
start_y     = 90
batch       = 1 ;//0 camid = 0, 1 camid = 1
