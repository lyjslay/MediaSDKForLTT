[work_mode]
poweron_mode = "record"

; vo config
[vo_config]
vo_cnt  = 1

[vo0]
width   = 320
height  = 240
fps = -1
rotate  = 0 ;0  ; 0:0 1:90 2:180 3:270

; window config
[window_config]
window_cnt  = 2

[window0]
enable      = 1
used_crop   = 1
small_win_enable    = 0
bind_vproc_id       = 0
bind_vproc_chn_id   = 1
x           = 0
y           = 0
width       = 320
height      = 172
s_x         = 0
s_y         = 0
s_width     = 320
s_height    = 172
onestep     = 20
ystep       = 0
mirror      = 0
filp        = 0

[window1]
enable      = 1
used_crop   = 1
small_win_enable    = 0
bind_vproc_id       = 1
bind_vproc_chn_id   = 1
x           = 0
y           = 0
width       = 320
height      = 172
s_x         = 0
s_y         = 0
s_width     = 320
s_height    = 172
onestep     = 20
ystep       = 0
mirror      = 0
filp        = 0


; Ai config
[ai]
sample_rate = 16000
channel     = 2
num_per_frm = 640 ;1024 -> ts ;640 -> mov
audio_channel = 1
isVquOn = 0
volume = 10 ;15

; Aenc config
[aenc]
format      = 3 ; 0: aac, 3: disable
sample_rate = 16000
num_per_frm = 640 ;1024 -> ts ;640 -> mov
channel     = 2

; Ao config
[ao]
sample_rate = 16000
channel     = 2
num_per_frm = 320
audio_channel = 1
volume = 24

; record
[record_config]
rec_cnt = 2

[record0]
enable          = 1
bind_venc_id    = 0
audio_status    = 1
file_type       = 1 ;// 0:MP4, 1:MOV, 2:TS, 3:ES, 4:NONE
split_time      = 60000 ; msec
pre_time        = 0 ; sec
post_time       = 10 ; sec
timelapse_recorder_fps  = 25
timelapse_recorder_gop  = 0
memory_buffer_sec = 0
pre_alloc_unit  = 20 ;//pre allocate unit  MB
short_file_ms = 1200
devmodel = "sophgo"

[record1]
enable          = 1
bind_venc_id    = 4
audio_status    = 1
file_type       = 1 ;// 0:MP4, 1:MOV, 2:TS, 3:ES, 4:NONE
split_time      = 60000 ; msec
pre_time        = 0 ; sec
post_time       = 10 ; sec
timelapse_recorder_fps  = 25
timelapse_recorder_gop  = 0
memory_buffer_sec = 0
pre_alloc_unit  = 20 ;//pre allocate unit  MB
short_file_ms = 1200
devmodel = "sophgo"

; PIV config
[piv_config]
piv_cnt     = 2

[piv0]
bind_venc_id    = 2

[piv1]
bind_venc_id    = 6

; rtsp config
[rtsp_config]
rtsp_cnt    = 2
port        = 554
timeout     = 120

[rtsp0]
enable       = 1
bind_venc_id = 1
max_conn    = 2
name = "cvi_cam_0"

[rtsp1]
enable       = 1
bind_venc_id = 5
max_conn    = 2
name = "cvi_cam_1"

; thm config
[thm_config]
thm_cnt     = 2

[thm0]
bind_venc_id    = 3

[thm1]
bind_venc_id    = 7

; IRCut config
[isp_config]
isp_cnt    = 1

[isp0]
enable          = 1
cam_id          = 1
ir_control     = 1    ; 0: auto; 1:manual
ir_cut_a       = -1   ; gpio config
ir_cut_b       = -1
led_white       = -1
led_ir          = 510
Normal2IrIsoThr = 800   ;//黑暗环境临界值
Ir2NormalIsoThr = 450   ;//正常环境临界值
day_bin_path  = "/mnt/system/bin/cvi_sdr_bin"
night_bin_path  = "/mnt/system/bin/cvi_sdr_bin"


