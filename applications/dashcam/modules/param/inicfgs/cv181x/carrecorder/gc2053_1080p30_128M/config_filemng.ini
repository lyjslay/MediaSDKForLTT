; common config
[common]
mnt_path = "/mnt/sd/"


; dtcf config
[dtcf]
root_path          = "CARDV"
pre_alloc_cnt      = "100";
pre_alloc_unit     = "3110400";unit: byte
sharepercent       = 95
warning            = 4
guaranteed         = 5

[dir_name]
dir_name0 = "EMR"
dir_name1 = "MOVIE"
dir_name2 = "PHOTO"

[prealloc]
enable = 0
reserve_memory = 5 ;percentage
pre_alloc_cnt_dir_0       = "15"; percentage
pre_alloc_unit_dir_0      = "20";unit: MB
pre_alloc_cnt_dir_1       = "80"; percentage
pre_alloc_unit_dir_1      = "100";unit: MB
pre_alloc_cnt_dir_2      = "5";percentage
pre_alloc_unit_dir_2     = "2";unit: MB



